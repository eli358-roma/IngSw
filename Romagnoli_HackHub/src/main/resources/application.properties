# ========== SPRING BOOT ==========
spring.application.name=HackHub
server.port=8080

# ========== THYMELEAF ==========
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html

# ========== H2 DATABASE ==========
spring.datasource.url=jdbc:h2:mem:hackhubdb;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ========== JPA/HIBERNATE ==========
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========== H2 CONSOLE ==========
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========== CUSTOM PROPERTIES ==========
# Configurazione servizi esterni
calendar.service.enabled=true
payment.service.enabled=true

# ========== SCHEDULING ==========
# Abilita scheduling per aggiornamento automatico stati
spring.task.scheduling.pool.size=2
