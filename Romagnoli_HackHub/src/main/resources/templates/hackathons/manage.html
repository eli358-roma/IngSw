<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'HackHub - Gestione ' + ${hackathon.name}">HackHub - Gestione Hackathon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3a0ca3;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        .navbar-custom {
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
        }
        .management-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        .btn-hackhub {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">
            <i class="bi bi-code-slash me-2"></i><strong>HackHub</strong>
        </a>
    </div>
</nav>

<div class="container mt-4" th:with="h=${hackathon}">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/dashboard">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="/hackathons">Hackathon</a></li>
            <li class="breadcrumb-item"><a th:href="@{/hackathons/{id}(id=${h.id})}" th:text="${h.name}">Nome</a></li>
            <li class="breadcrumb-item active">Gestione</li>
        </ol>
    </nav>

    <h1 class="mb-4"><i class="bi bi-gear me-2 text-primary"></i>Gestione Hackathon</h1>

    <!-- Stato Attuale -->
    <div class="management-card">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h5>Stato Attuale</h5>
                <span th:switch="${h.status}" class="badge fs-6 p-2">
                        <span th:case="'INSCRIZIONE'" class="badge bg-primary">In Iscrizione</span>
                        <span th:case="'IN_CORSO'" class="badge bg-success">In Corso</span>
                        <span th:case="'IN_VALUTAZIONE'" class="badge bg-warning">In Valutazione</span>
                        <span th:case="'CONCLUSO'" class="badge bg-secondary">Concluso</span>
                    </span>
            </div>
            <div>
                <select class="form-select" id="statusSelect" style="width: auto; display: inline-block; margin-right: 10px;">
                    <option value="INSCRIZIONE">In Iscrizione</option>
                    <option value="IN_CORSO">In Corso</option>
                    <option value="IN_VALUTAZIONE">In Valutazione</option>
                    <option value="CONCLUSO">Concluso</option>
                </select>
                <button class="btn btn-primary" onclick="updateStatus()">Aggiorna Stato</button>
            </div>
        </div>
    </div>

    <!-- Gestione Giudice -->
    <div class="management-card">
        <h5><i class="bi bi-award me-2"></i>Giudice</h5>
        <hr>
        <div class="row">
            <div class="col-md-6">
                <p><strong>Giudice attuale:</strong>
                    <span th:text="${h.judge != null ? h.judge.username : 'Non assegnato'}"></span>
                </p>
            </div>
            <div class="col-md-6">
                <div class="input-group">
                    <select class="form-select" id="judgeSelect">
                        <option value="">Seleziona giudice...</option>
                        <option th:each="judge : ${availableJudges}"
                                th:value="${judge.id}"
                                th:text="${judge.username}"></option>
                    </select>
                    <button class="btn btn-primary" onclick="assignJudge()">Assegna</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Gestione Mentori -->
    <div class="management-card">
        <h5><i class="bi bi-chat-dots me-2"></i>Mentori</h5>
        <hr>
        <div class="row">
            <div class="col-md-6">
                <p><strong>Mentori attuali:</strong></p>
                <div th:if="${h.mentors != null and !h.mentors.isEmpty()}">
                        <span class="badge bg-info me-1 p-2" th:each="mentor : ${h.mentors}"
                              th:text="${mentor.username}"></span>
                </div>
                <p th:if="${h.mentors == null or h.mentors.isEmpty()}" class="text-muted">
                    Nessun mentore assegnato
                </p>
            </div>
            <div class="col-md-6">
                <div class="input-group">
                    <select class="form-select" id="mentorSelect">
                        <option value="">Seleziona mentore...</option>
                        <option th:each="mentor : ${availableMentors}"
                                th:value="${mentor.id}"
                                th:text="${mentor.username}"></option>
                    </select>
                    <button class="btn btn-primary" onclick="addMentor()">Aggiungi</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Proclama Vincitore -->
    <div class="management-card" th:if="${h.status == 'CONCLUSO'}">
        <h5><i class="bi bi-trophy me-2 text-warning"></i>Proclama Vincitore</h5>
        <hr>
        <div th:if="${h.teams != null and !h.teams.isEmpty()}">
            <div class="row">
                <div th:each="team : ${h.teams}" class="col-md-4 mb-3">
                    <div class="card">
                        <div class="card-body">
                            <h6 th:text="${team.name}">Nome Team</h6>
                            <p class="small">Punteggio: <span th:text="${team.score != null ? team.score : 'Non valutato'}"></span></p>
                            <button class="btn btn-warning btn-sm"
                                    th:onclick="'declareWinner(' + ${team.id} + ')'"
                                    th:disabled="${team.score == null}">
                                Proclama Vincitore
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${h.teams == null or h.teams.isEmpty()}" class="text-center py-3">
            <p class="text-muted">Nessun team disponibile</p>
        </div>
    </div>
</div>

<script>
    function updateStatus() {
        const newStatus = document.getElementById('statusSelect').value;
        fetch('/api/hackathons/' + [[${hackathon.id}]] + '/status', {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({status: newStatus})
        })
        .then(response => response.json())
        .then(data => {
            alert('Stato aggiornato con successo!');
            location.reload();
        })
        .catch(error => alert('Errore: ' + error));
    }

    function assignJudge() {
        const judgeId = document.getElementById('judgeSelect').value;
        if (!judgeId) return alert('Seleziona un giudice');

        fetch('/api/hackathons/' + [[${hackathon.id}]] + '/assign-judge', {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({judgeId: judgeId})
        })
        .then(response => response.json())
        .then(data => {
            alert('Giudice assegnato con successo!');
            location.reload();
        })
        .catch(error => alert('Errore: ' + error));
    }

    function addMentor() {
        const mentorId = document.getElementById('mentorSelect').value;
        if (!mentorId) return alert('Seleziona un mentore');

        fetch('/api/hackathons/' + [[${hackathon.id}]] + '/add-mentor', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({mentorId: mentorId})
        })
        .then(response => response.json())
        .then(data => {
            alert('Mentore aggiunto con successo!');
            location.reload();
        })
        .catch(error => alert('Errore: ' + error));
    }

    function declareWinner(teamId) {
        if (!confirm('Sei sicuro di voler proclamare questo team vincitore?')) return;

        fetch('/api/hackathons/' + [[${hackathon.id}]] + '/declare-winner', {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({teamId: teamId})
        })
        .then(response => response.json())
        .then(data => {
            alert('Vincitore proclamato con successo!');
            location.reload();
        })
        .catch(error => alert('Errore: ' + error));
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
