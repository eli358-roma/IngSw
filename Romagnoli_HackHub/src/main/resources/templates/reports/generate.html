<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackHub - Genera Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --primary-color: #4361ee; --secondary-color: #3a0ca3; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        .navbar-custom {
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
        }
        .generator-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .report-preview {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border: 2px dashed #dee2e6;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard"><i class="bi bi-code-slash me-2"></i><strong>HackHub</strong></a>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="generator-card">
                <h2 class="mb-4"><i class="bi bi-file-earmark-text me-2 text-primary"></i>Genera Report Personalizzato</h2>

                <form>
                    <div class="mb-4">
                        <h5>Tipo Report</h5>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="reportType" id="reportHackathon" checked>
                            <label class="form-check-label" for="reportHackathon">
                                Report Hackathon (dettaglio singolo hackathon)
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="reportType" id="reportGeneral">
                            <label class="form-check-label" for="reportGeneral">
                                Report Generale (statistiche piattaforma)
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="reportType" id="reportTeam">
                            <label class="form-check-label" for="reportTeam">
                                Report Team (performance team)
                            </label>
                        </div>
                    </div>

                    <div class="mb-4" id="hackathonSelect">
                        <h5>Seleziona Hackathon</h5>
                        <select class="form-select">
                            <option>AI Innovation Challenge</option>
                            <option>Green Tech Hackathon</option>
                            <option>Blockchain Innovation</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <h5>Periodo</h5>
                        <div class="row">
                            <div class="col-md-6">
                                <label class="form-label">Dal</label>
                                <input type="date" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Al</label>
                                <input type="date" class="form-control">
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <h5>Formato</h5>
                        <div class="btn-group" role="group">
                            <input type="radio" class="btn-check" name="format" id="pdf" checked>
                            <label class="btn btn-outline-primary" for="pdf">PDF</label>

                            <input type="radio" class="btn-check" name="format" id="excel">
                            <label class="btn btn-outline-primary" for="excel">Excel</label>

                            <input type="radio" class="btn-check" name="format" id="csv">
                            <label class="btn btn-outline-primary" for="csv">CSV</label>
                        </div>
                    </div>

                    <div class="mb-4">
                        <h5>Includi nel report</h5>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" checked>
                                    <label class="form-check-label">Statistiche generali</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" checked>
                                    <label class="form-check-label">Dettaglio team</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" checked>
                                    <label class="form-check-label">Valutazioni</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" checked>
                                    <label class="form-check-label">Sottomissioni</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox">
                                    <label class="form-check-label">Richieste supporto</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox">
                                    <label class="form-check-label">Grafici</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <hr>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary btn-lg flex-grow-1">
                            <i class="bi bi-file-earmark-arrow-down me-2"></i>Genera Report
                        </button>
                        <button type="button" class="btn btn-outline-secondary btn-lg">
                            <i class="bi bi-eye me-2"></i>Anteprima
                        </button>
                    </div>
                </form>

                <!-- Anteprima Report -->
                <div class="report-preview mt-4">
                    <h6>Anteprima Report</h6>
                    <p class="text-muted small">Il report includerà:</p>
                    <ul class="small">
                        <li>Statistiche hackathon selezionato</li>
                        <li>Lista team partecipanti con punteggi</li>
                        <li>Andamento sottomissioni nel tempo</li>
                        <li>Valutazioni dettagliate</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
